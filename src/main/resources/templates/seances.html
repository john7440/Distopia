<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Distopia — Séances</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container py-5">

        <a th:href="@{/movies(cinemaId=${cinemaId})}" class="btn btn-outline-danger mb-4">
            <i class="bi bi-arrow-left"></i> Retour aux films
        </a>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <h2 class="fw-bold mb-4">
            Séances disponibles
        </h2>

        <!-- liste séances -->
        <div class="row g-3" th:if="${seances != null and !seances.isEmpty()}">
            <div class="col-md-4" th:each="seance : ${seances}">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <p class="fw-semibold mb-1">
                                <i class="bi bi-calendar-event text-dark"></i>
                                <span th:text="${#temporals.format(seance.dateTime, 'EEEE dd MMMM yyyy', #locale.FRENCH)}"></span>
                            </p>
                            <p class="text-muted mb-1">
                                <i class="bi bi-clock"></i>
                                <span th:text="${#temporals.format(seance.dateTime, 'HH:mm')}"></span>
                            </p>
                            <p class="mb-1">
                                <span class="badge"
                                      th:classappend="${seance.availableSeats == 0} ? 'bg-danger' : 'bg-success'"
                                      th:text="${seance.availableSeats} + ' place(s) disponible(s)'">
                                </span>
                            </p>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-geo-alt text-primary"></i>
                                <span th:text="${seances[0].cinema.name}"></span>
                            </p>
                            <p class="fw-bold text-primary" th:text="${seance.price} + ' €'"></p>
                        </div>

                        <!-- réserver-->
                        <div th:if="${session.connectedUser != null}">
                            <form th:action="@{/reserve}" method="post"
                                  th:if="${seance.availableSeats > 0 and session.connectedUser != null}">
                                <input type="hidden" name="seanceId" th:value="${seance.id}">
                                <div class="input-group mb-2">
                                    <span class="input-group-text">Places</span>
                                    <input type="number" name="quantity" class="form-control"
                                           value="1" min="1"
                                           th:max="${seance.availableSeats}">
                                </div>
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-ticket-perforated"></i> Réserver
                                </button>
                            </form>
                            <button class="btn btn-secondary w-100 disabled"
                                    th:if="${seance.availableSeats == 0}">
                                Complet
                            </button>
                        </div>

                        <!-- redirection login + sauvegarde de l'url avant redirection-->
                        <div th:if="${session.connectedUser == null}">
                            <a th:href="@{/login(redirect=${'/seances?movieId=' + movieId + '&cinemaId=' + cinemaId})}"
                                <i class="bi bi-person-circle"></i> Connectez-vous pour réserver
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>


        <div th:if="${seances == null or seances.isEmpty()}"
             class="text-center py-5 text-muted">
            <i class="bi bi-calendar-x fs-1 d-block mb-3"></i>
            <p class="fs-5">Aucune séance disponible pour ce film</p>
        </div>

    </div>
    <!-- modal confirmation réservation existante -->
    <div th:if="${confirmNeeded}"
         class="modal fade show d-block"
         style="background: rgba(0,0,0,0.5);"
         tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header bg-warning">
                    <h5 class="modal-title fw-bold">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Réservation existante
                    </h5>
                </div>

                <div class="modal-body">
                    <p>Attention ! Vous avez déjà une réservation pour cette séance </p>
                    <p>Voulez-vous ajouter
                        <strong th:text="${pendingQuantity} + ' place(s)'"></strong>
                        à votre réservation existante ?
                    </p>
                </div>

                <div class="modal-footer">
                    <a th:href="@{/seances(movieId=${movieId}, cinemaId=${cinemaId})}"
                       class="btn btn-outline-danger">Annuler
                    </a>

                    <!--renvoie le POST avec confirmed=true -->
                    <form th:action="@{/reserve}" method="post">
                        <input type="hidden" name="seanceId"
                               th:value="${pendingSeanceId}">
                        <input type="hidden" name="quantity"
                               th:value="${pendingQuantity}">
                        <input type="hidden" name="confirmed" value="true">
                        <button type="submit" class="btn btn-success fw-bold">
                             Confirmer l'ajout
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>
</body>
</html>
