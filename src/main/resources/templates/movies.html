<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Distopia — Films</title>
    <style>
        .movie-card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .movie-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15) !important;
        }

        .movie-card:active {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12) !important;
        }
    </style>
</head>
<body>
<section layout:fragment="content">
    <div class="container py-5">

        <a th:href="@{/cinemas}" class="btn btn-outline-danger mb-4">
            <i class="bi bi-arrow-left"></i> Retour aux cinémas
        </a>

        <h2 class="fw-bold mb-4">
            <i class="bi bi-film text-dark"></i> Films à l'affiche
        </h2>
git co
        <!-- liste films -->
        <div class="row g-4">
        <div class="col-md-4 col-lg-3" th:each="movie : ${movies}">
            <a th:href="@{/movie(id=${movie.id})}"
               class="text-decoration-none movie-card-link">
                <div class="card h-100 shadow-sm border-0 movie-card">

                    <!-- Affiche -->
                    <img th:if="${movie.imageUrl != null and !movie.imageUrl.isBlank()}"
                         th:src="${movie.imageUrl}"
                         th:alt="${movie.title}"
                         class="card-img-top object-fit-cover"
                         style="height: 320px;">
                    <div th:if="${movie.imageUrl == null or movie.imageUrl.isBlank()}"
                         class="bg-dark d-flex align-items-center justify-content-center"
                         style="height: 320px;">
                        <i class="bi bi-film text-secondary" style="font-size: 4rem;"></i>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold text-dark" th:text="${movie.title}"></h5>

                        <div class="mb-2 d-flex gap-1 flex-wrap">
                    <span class="badge bg-primary"
                          th:if="${movie.genre != null and !movie.genre.isBlank()}"
                          th:text="${movie.genre}"></span>
                            <span class="badge bg-light text-dark border">
                        <i class="bi bi-clock"></i>
                        <span th:text="${movie.duration} + ' min'"></span>
                    </span>
                        </div>

                        <p class="card-text text-muted small flex-grow-1"
                           th:if="${movie.description != null and !movie.description.isBlank()}"
                           th:text="${#strings.abbreviate(movie.description, 120)}"></p>
                    </div>

                    <!-- Hint visuel en bas de card -->
                    <div class="card-footer bg-transparent border-0 pb-3 px-3">
                <span class="text-primary small fw-semibold">
                    <i class="bi bi-info-circle me-1"></i>
                    <span th:if="${cinemaId != null}">Voir les détails et séances</span>
                    <span th:if="${cinemaId == null}">Voir les détails</span>
                </span>
                    </div>

                </div>
            </a>
        </div>

        <div th:if="${movies == null or movies.isEmpty()}"
             class="text-center py-5 text-muted">
            <i class="bi bi-film fs-1 d-block mb-3"></i>
            <p class="fs-5">Aucun film à l'affiche pour ce cinéma</p>
            <a th:href="@{/cinemas}" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Retour aux cinémas
            </a>
        </div>

    </div>
    </div>
</section>
</body>
</html>
